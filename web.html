<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Barcode Label Generator</title>
		<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

		<link rel="stylesheet" href="assets/main.css">
	</head>
	<body>
		<div class="ze-initial">ZelkeyZZ</div>
		<div class="app-layout">
			<div class="container main-container">
				<h1>Barcode Label Generator</h1>
				
				<div class="form-group">
					<button id="openCsvBtn" type="button">Open CSV</button>
					<span id="csvFileName" style="margin-left:12px; font-weight:600; color:#222;">No file loaded</span>
					<input id="csvFile" type="file" accept=".csv" style="display:none" />
					<div  id="csvStatus" style="display:none; padding:6px 8px; border-radius:4px; background:#eef6ff; color:#034; font-size:13px;">
						<div>
							<strong id="csvStatusText">CSV reloaded</strong>
							<span id="csvStatusTime" style="font-weight:normal;"></span>
						</div>
					</div>
					<div>
						<button onclick="printLabel()">Print Label</button>
						<button onclick="downloadImage()">Download Label</button>
					</div>
				</div>

				<div class="form-group">
				<label for="skuInput">Enter 8-digit SKU</label>
				<input type="text" id="skuInput" maxlength="8" inputmode="numeric" placeholder="e.g. 20178202">
				</div>
				
				<div class="form-group">
					<label for="seasonInput">Enter Season Code</label>
					<input type="text" id="seasonInput" maxlength="3" placeholder="e.g. 402">
				</div>

				<div class="container" id="test">
					<div class="label-display" id="labelDisplay" style="display:block; width:100%;">
						<div class="label" id="label">
							<svg id="barcode"></svg>
							<div class="left-section" style="border-left:2px solid black;">
								<div class="row" id="productName" style="font-size:1em; font-weight:bold;" placeholder="NOVA"></div>
								<div class="row">
									<span id="skuDisplay" placeholder="20391024"></span>
								</div>
								<div class="row">
									<span style="font-size:10px;">SEASON CODE</span>
									<br>
									<span id="seasonDisplay" style="font-size:19px; font-weight:bold;" placeholder="402"></span>
								</div>
							</div>

							<div class="right-section">
								<div class="table-row">
									<div class="cell" style="text-align: right;">
										<span style="font-size:15px;">US</span>
										<span id="sizeDisplay" style="font-size:20px; font-weight:bold;" placeholder="10"></span>
									</div>
								</div>
								<div class="table-row">
									<div class="cell" style="text-align:right;">
										<span style="font-size:10px;"></span>
										<span style="font-size:15px;"></span>
									</div>
								</div>
								<div class="table-row" style="height:46.5px;">
									<div class="cell" id="colorDisplay" style="font-size:1em; font-weight:bold; align-items:center; display:grid;" placeholder="WHITE"></div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="container search-container">
				<h2 style="margin-top:0;">Search</h2>
				<div class="form-group">
					<label for="productSearchInput">Search Product Name</label>
					<input type="text" id="productSearchInput" placeholder="e.g. MELVIN" autocomplete="off">
				</div>
				<div class="form-group" style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
					<div id="searchCount" style="font-weight:600; color:#222;">Type to search...</div>
					<div style="display:flex; gap:8px;">
						<button type="button" id="prevSearchBtn" disabled>Prev</button>
						<button type="button" id="nextSearchBtn" disabled>Next</button>
					</div>
				</div>
				<div id="searchResults" class="search-results"></div>
			</div>
		</div>
		<script src="assets/main.js"></script>
	</body>
</html>
